name: Update Citations & Social Assets

on:
  push:
    paths: ["data/dois.json"]
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: site-assets
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci || npm install
      - name: Fetch citations from CrossRef
        env:
          CROSSREF_MAILTO: ${{ secrets.CROSSREF_MAILTO }}
        run: npm run citations
      - name: Generate OG image & PNG favicons
        run: npm run og
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/citations.json assets/og-image.png assets/apple-touch-icon.png assets/favicon-32.png
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: auto-update citations & social assets [skip ci]"
            git push
          fi
